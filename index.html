<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<title>메이플식 자동사냥 RPG</title>
<style>
  :root { --speed: 1; }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: 'Malgun Gothic', sans-serif;
    background: #0d0d1a;
    color: #eee;
    padding: 8px;
    font-size: 13px;
    min-height: 100vh;
  }
  h1 { font-size: 18px; margin-bottom: 8px; color: #ffcc66; text-align: center;
       text-shadow: 0 0 10px rgba(255,204,102,0.4); }
  h2 { font-size: 14px; margin-bottom: 6px; color: #88ccff; border-bottom: 1px solid #444; padding-bottom: 3px; }
  h3 { font-size: 13px; margin: 8px 0 4px; color: #ffaa88; }

  .layout {
    display: grid;
    grid-template-columns: 1fr 1.6fr 1.3fr;
    grid-template-rows: auto auto 1fr auto;
    gap: 8px;
    min-height: calc(100vh - 50px);
  }
  .panel {
    background: #2a2a44;
    border: 1px solid #444;
    border-radius: 6px;
    padding: 10px;
    overflow-y: auto;
  }
  .top    { grid-column: 1 / 4; grid-row: 1; }
  .scene-row { grid-column: 1 / 4; grid-row: 2; padding: 0; overflow: hidden; }
  .left   { grid-column: 1; grid-row: 3; max-height: 440px; }
  .center { grid-column: 2; grid-row: 3; max-height: 440px; }
  .right  { grid-column: 3; grid-row: 3; max-height: 440px; }
  .bottom { grid-column: 1 / 4; grid-row: 4; max-height: 120px; }

  /* ===== SCENE ===== */
  .scene {
    position: relative;
    height: 280px;
    border: 2px solid #444;
    border-radius: 8px;
    overflow: hidden;
    background: linear-gradient(180deg, #87CEEB 0%, #FFE4B5 65%, #228B22 65%, #1a5a14 100%);
  }
  .scene.town    { background: linear-gradient(180deg, #87CEEB 0%, #FFE4B5 65%, #5fb84a 65%, #2d6b1f 100%); }
  .scene.meadow  { background: linear-gradient(180deg, #87CEEB 0%, #B0E0E6 55%, #90EE90 55%, #4a7a2a 100%); }
  .scene.forest  { background: linear-gradient(180deg, #2a3a4a 0%, #1a2a1a 50%, #0d2010 50%, #050d05 100%); }
  .scene.cave    { background: radial-gradient(ellipse at center top, #4a2244 0%, #1a0820 50%, #0a0410 100%); }

  /* 스킬 발동 시 화면 플래시 */
  .scene.skill-flash::after {
    content: '';
    position: absolute;
    inset: 0;
    pointer-events: none;
    background: radial-gradient(ellipse at center, rgba(255,235,150,0.5), transparent 70%);
    animation: skill-flash calc(0.4s / var(--speed)) ease-out;
    z-index: 30;
  }
  @keyframes skill-flash {
    0%   { opacity: 0; }
    30%  { opacity: 1; }
    100% { opacity: 0; }
  }

  .prop {
    position: absolute;
    user-select: none;
    pointer-events: none;
    filter: drop-shadow(2px 2px 3px rgba(0,0,0,0.4));
  }
  .cloud {
    position: absolute;
    font-size: 40px;
    opacity: 0.85;
    animation: cloud-drift 60s linear infinite;
  }
  @keyframes cloud-drift {
    from { transform: translateX(-100px); }
    to   { transform: translateX(120vw); }
  }
  .torch { animation: flicker 1.2s ease-in-out infinite; }
  @keyframes flicker {
    0%,100% { opacity: 1; filter: drop-shadow(0 0 8px #ff7); }
    50%     { opacity: 0.7; filter: drop-shadow(0 0 14px #fb3); }
  }
  .scene.cave .prop { filter: drop-shadow(0 0 6px rgba(255,150,80,0.3)); }

  .scene-label {
    position: absolute;
    top: 8px; left: 10px;
    background: rgba(0,0,0,0.5);
    padding: 3px 8px;
    border-radius: 4px;
    font-weight: bold;
    color: #fff;
    font-size: 13px;
    z-index: 20;
  }
  .scene-info {
    position: absolute;
    top: 36px; left: 10px;
    background: rgba(0,0,0,0.4);
    padding: 2px 8px;
    border-radius: 4px;
    color: #ffcc66;
    font-size: 11px;
    z-index: 20;
  }

  /* 속도 토글 */
  .speed-toggle {
    position: absolute;
    top: 8px;
    right: 10px;
    z-index: 21;
    display: flex;
    gap: 0;
    background: rgba(0,0,0,0.55);
    border-radius: 4px;
    padding: 2px;
  }
  .speed-toggle button {
    margin: 0;
    font-size: 11px;
    padding: 3px 8px;
    background: transparent;
    border: 1px solid #555;
    color: #ddd;
    border-radius: 3px;
  }
  .speed-toggle button.active {
    background: #5a4a8e;
    border-color: #aa88ff;
    color: #fff;
    font-weight: bold;
  }

  /* 콤보 카운터 */
  .combo-counter {
    position: absolute;
    top: 8px;
    left: 50%;
    transform: translateX(-50%);
    background: rgba(0,0,0,0.65);
    padding: 4px 14px;
    border-radius: 18px;
    font-weight: bold;
    color: #ffcc44;
    text-shadow: 0 0 8px #fb3, 1px 1px 0 #000;
    z-index: 20;
    border: 2px solid #fb3;
    display: none;
    font-size: 16px;
  }
  .combo-counter.show { display: block; }
  .combo-counter.tier2 { color:#ff88ff; border-color:#f8f; text-shadow:0 0 8px #f8f; font-size:18px; }
  .combo-counter.tier3 { color:#88ffff; border-color:#8ff; text-shadow:0 0 12px #8ff; font-size:20px; }
  .combo-counter.tier4 { color:#ff4488; border-color:#f48; text-shadow:0 0 16px #f48; font-size:24px; }
  .combo-counter.popped { animation: combo-pop calc(0.3s / var(--speed)); }
  @keyframes combo-pop {
    0%   { transform: translateX(-50%) scale(1); }
    40%  { transform: translateX(-50%) scale(1.4); }
    100% { transform: translateX(-50%) scale(1); }
  }
  .combo-bonus { font-size: 10px; color:#aaa; }

  /* 스킬 쿨다운 게이지 (씬 하단) */
  .skill-bar {
    position: absolute;
    bottom: 4px; left: 50%;
    transform: translateX(-50%);
    width: 120px; height: 6px;
    background: rgba(0,0,0,0.5);
    border-radius: 3px;
    overflow: hidden;
    z-index: 20;
    display: none;
  }
  .skill-bar.show { display: block; }
  .skill-bar > div {
    height: 100%;
    background: linear-gradient(90deg, #ffaa44, #ff4444);
    transition: width 0.15s linear;
  }
  .skill-bar-label {
    position: absolute;
    bottom: 12px; left: 50%;
    transform: translateX(-50%);
    font-size: 10px; color: #ffcc66;
    z-index: 20;
    text-shadow: 1px 1px 0 #000;
  }

  /* ===== 액터 ===== */
  .actor {
    position: absolute;
    bottom: 20px;
    display: flex;
    flex-direction: column;
    align-items: center;
    z-index: 5;
  }
  .hero    { left: 22%; transform: translateX(-50%); }
  .monster { right: 22%; transform: translateX(50%); display: none; }
  .monster.show { display: flex; }

  .actor-name {
    font-size: 11px;
    color: #fff;
    text-shadow: 1px 1px 2px #000, -1px -1px 2px #000;
    margin-bottom: 2px;
    font-weight: bold;
  }
  .actor-bar {
    width: 70px;
    height: 7px;
    background: #000;
    border: 1px solid #aaa;
    border-radius: 4px;
    overflow: hidden;
    margin-bottom: 4px;
  }
  .actor-bar > div {
    height: 100%;
    background: linear-gradient(90deg, #ff4444, #ff8866);
    transition: width 0.3s ease-out;
  }
  .monster .actor-bar > div {
    background: linear-gradient(90deg, #aa44ff, #ff66aa);
  }

  .actor-emoji {
    font-size: 60px;
    line-height: 1;
    filter: drop-shadow(3px 3px 5px rgba(0,0,0,0.7));
    animation: idle-bob 2.2s ease-in-out infinite;
    transform-origin: center bottom;
  }
  @keyframes idle-bob {
    0%,100% { transform: translateY(0); }
    50%     { transform: translateY(-4px); }
  }

  .actor::after {
    content: '';
    position: absolute;
    bottom: -8px;
    width: 50px;
    height: 12px;
    background: radial-gradient(ellipse, rgba(0,0,0,0.5), transparent 70%);
    z-index: -1;
  }

  .hero.attacking    .actor-emoji { animation: hero-attack calc(0.4s / var(--speed)) ease-out; }
  .hero.skill        .actor-emoji { animation: hero-skill calc(0.5s / var(--speed)) ease-out; }
  .monster.attacking .actor-emoji { animation: monster-attack calc(0.4s / var(--speed)) ease-out; }
  .hero.hurt    .actor-emoji { animation: hero-hurt calc(0.35s / var(--speed)) ease-out; }
  .monster.hurt .actor-emoji { animation: monster-hurt calc(0.35s / var(--speed)) ease-out; }
  .monster.dying .actor-emoji { animation: monster-die calc(0.6s / var(--speed)) ease-in forwards; }

  @keyframes hero-attack {
    0%   { transform: translateX(0) rotate(0); }
    30%  { transform: translateX(50px) rotate(15deg) scale(1.1); }
    60%  { transform: translateX(70px) rotate(-5deg); }
    100% { transform: translateX(0) rotate(0); }
  }
  @keyframes hero-skill {
    0%   { transform: translateX(0) rotate(0) scale(1); }
    20%  { transform: translateX(-15px) scale(1.15); }
    50%  { transform: translateX(90px) rotate(25deg) scale(1.4); filter: drop-shadow(0 0 18px #ffeb3b); }
    80%  { transform: translateX(70px) rotate(-15deg) scale(1.2); }
    100% { transform: translateX(0) rotate(0) scale(1); }
  }
  @keyframes monster-attack {
    0%   { transform: translateX(0) rotate(0); }
    30%  { transform: translateX(-50px) rotate(-15deg) scale(1.1); }
    60%  { transform: translateX(-70px) rotate(5deg); }
    100% { transform: translateX(0) rotate(0); }
  }
  @keyframes hero-hurt {
    0%,100% { transform: translateX(0); filter: drop-shadow(3px 3px 5px #000); }
    25%     { transform: translateX(-15px); filter: drop-shadow(0 0 12px #f44) brightness(1.8); }
    50%     { transform: translateX(5px); }
  }
  @keyframes monster-hurt {
    0%,100% { transform: translateX(0); filter: drop-shadow(3px 3px 5px #000); }
    25%     { transform: translateX(15px); filter: drop-shadow(0 0 12px #ff4) brightness(2); }
    50%     { transform: translateX(-5px); }
  }
  @keyframes monster-die {
    0%   { transform: scale(1) rotate(0); opacity: 1; }
    100% { transform: scale(0.2) rotate(720deg); opacity: 0; }
  }

  /* 데미지 / 슬래시 / 빅슬래시 */
  .effects { position: absolute; inset: 0; pointer-events: none; z-index: 15; }
  .dmg-num {
    position: absolute;
    font-weight: bold;
    font-size: 22px;
    color: #ffeb3b;
    text-shadow: 2px 2px 0 #000, -1px -1px 0 #000, 1px -1px 0 #000, -1px 1px 0 #000;
    animation: dmg-float calc(0.9s / var(--speed)) ease-out forwards;
  }
  .dmg-num.crit { font-size: 32px; color: #ff3344; text-shadow: 0 0 10px #f88, 2px 2px 0 #000; }
  .dmg-num.skill { font-size: 38px; color: #ffeb3b; text-shadow: 0 0 14px #fb3, 2px 2px 0 #000; }
  .dmg-num.player { color: #ff7777; font-size: 18px; }
  @keyframes dmg-float {
    0%   { transform: translate(-50%, 0) scale(0.5); opacity: 0; }
    20%  { transform: translate(-50%, -10px) scale(1.2); opacity: 1; }
    100% { transform: translate(-50%, -70px) scale(1); opacity: 0; }
  }

  .slash {
    position: absolute;
    font-size: 50px;
    pointer-events: none;
    animation: slash-anim calc(0.35s / var(--speed)) ease-out forwards;
    transform: translate(-50%, -50%);
    text-shadow: 0 0 8px #fff;
  }
  @keyframes slash-anim {
    0%   { transform: translate(-50%, -50%) scale(0.3) rotate(-60deg); opacity: 0; }
    40%  { transform: translate(-50%, -50%) scale(1.4) rotate(0deg); opacity: 1; }
    100% { transform: translate(-50%, -50%) scale(2.2) rotate(60deg); opacity: 0; }
  }
  .big-slash {
    position: absolute;
    font-size: 100px;
    pointer-events: none;
    animation: big-slash-anim calc(0.6s / var(--speed)) ease-out forwards;
    transform: translate(-50%, -50%);
    text-shadow: 0 0 25px #ffeb3b;
    z-index: 12;
  }
  @keyframes big-slash-anim {
    0%   { transform: translate(-50%, -50%) scale(0.2) rotate(-90deg); opacity: 0; }
    25%  { transform: translate(-50%, -50%) scale(1.8) rotate(0deg); opacity: 1; }
    100% { transform: translate(-50%, -50%) scale(3.5) rotate(90deg); opacity: 0; }
  }

  /* ===== 사이드 UI ===== */
  .stat-row { display: flex; justify-content: space-between; margin: 2px 0; font-size: 12px; }
  .stat-row span:first-child { color: #aaa; }
  .stat-row span:last-child  { color: #fff; font-weight: bold; }

  .hp-bar {
    width: 100%; height: 14px;
    background: #444; border-radius: 3px; overflow: hidden;
    margin: 3px 0;
  }
  .hp-bar > div { height: 100%; background: linear-gradient(90deg, #ff4444, #ff8866); transition: width 0.2s; }

  button {
    background: #3a3a5e;
    color: #eee;
    border: 1px solid #555;
    border-radius: 4px;
    padding: 3px 7px;
    margin: 2px;
    cursor: pointer;
    font-size: 11px;
    font-family: inherit;
  }
  button:hover:not(:disabled) { background: #4a4a7e; border-color: #888; }
  button:disabled { opacity: 0.4; cursor: not-allowed; }
  button.primary { background: #5a4a8e; }
  button.danger  { background: #8e4a4a; }
  button.success { background: #4a8e5a; }
  button.gold    { background: #8e7a3a; }
  button.flame   { background: #aa4422; }

  .map-btn {
    display: block; width: 100%; text-align: left;
    margin: 3px 0; padding: 6px 8px;
  }
  .map-btn.active { background: #6a8e4a; border-color: #aaff88; }
  .boss-tag { color: #ff8888; font-size: 10px; font-weight: bold; }

  .item-card {
    background: #1f1f38;
    border: 2px solid #555;
    border-radius: 4px;
    padding: 6px 8px;
    margin: 4px 0;
    font-size: 12px;
    position: relative;
  }
  .item-card.equipped { background: #2a2a3a; }
  .item-card.equipped::before {
    content:'장착중'; position:absolute; top:-8px; right:6px;
    background:#ffaa44; color:#222; font-size:10px; padding:1px 5px; border-radius:3px;
  }
  .item-name { font-weight: bold; color: #ffcc66; }
  .item-slot { color: #88ccff; font-size: 11px; }
  .item-line { color: #ccc; font-size: 11px; margin: 2px 0; }
  .item-pot  { font-size: 11px; margin: 2px 0; }
  .item-opt  { color: #ffddaa; font-size: 11px; margin: 2px 0; }
  .item-flame { color: #ff9966; font-size: 11px; margin: 2px 0; }
  .item-actions { margin-top: 4px; }

  .grade-label {
    display: inline-block;
    font-size: 10px;
    padding: 0 4px;
    border-radius: 2px;
    margin-right: 3px;
    font-weight: bold;
    color: #111;
  }

  .recipe-card {
    background: #1f1f38;
    border: 1px solid #555;
    border-radius: 4px;
    padding: 6px 8px;
    margin: 4px 0;
  }
  .recipe-name { font-weight: bold; color: #ffcc66; }
  .recipe-mat { color: #ccc; font-size: 11px; }
  .recipe-mat.lack { color: #ff8888; }

  .mat-row { display: flex; justify-content: space-between; font-size: 12px; padding: 2px 4px; }
  .mat-row:nth-child(odd) { background: #222238; }

  .tabs { display: flex; gap: 2px; margin-bottom: 6px; }
  .tabs button { flex: 1; font-size: 12px; padding: 5px; }
  .tabs button.active { background: #5a4a8e; border-color: #aa88ff; }

  .log-line { font-size: 11px; color: #ccc; padding: 1px 4px; }
  .log-line.gold { color: #ffcc66; }
  .log-line.drop { color: #88ff88; }
  .log-line.crit { color: #ff8866; }
  .log-line.fail { color: #ff6666; }
  .log-line.win  { color: #aaffaa; font-weight: bold; }
  .log-line.legendary { color: #44ff88; font-weight: bold; }
  .log-line.unique { color: #ffcc44; font-weight: bold; }
  .log-line.epic { color: #cc88ff; }
  .log-line.skill { color: #ffeb3b; font-weight: bold; }

  .empty { color: #666; font-style: italic; font-size: 12px; padding: 8px; text-align: center; }

  ::-webkit-scrollbar { width: 8px; }
  ::-webkit-scrollbar-track { background: #1a1a2e; }
  ::-webkit-scrollbar-thumb { background: #555; border-radius: 4px; }
</style>
</head>
<body>

<h1>⚔️ 메이플식 자동사냥 RPG</h1>

<div class="layout">
  <div class="panel top" id="playerPanel"></div>

  <div class="panel scene-row">
    <div class="scene town" id="sceneArea">
      <div class="scene-label" id="sceneLabel">🏘️ 마을</div>
      <div class="scene-info" id="sceneInfo"></div>

      <div class="speed-toggle" id="speedToggle">
        <button class="active" id="spd1" onclick="setSpeed(1)">⏱️ x1</button>
        <button id="spd2" onclick="setSpeed(2)">x2</button>
        <button id="spd4" onclick="setSpeed(4)">x4</button>
      </div>

      <div class="combo-counter" id="comboCounter">
        콤보 x<span id="comboNum">0</span>
        <div class="combo-bonus" id="comboBonus"></div>
      </div>

      <div class="scene-mid" id="sceneMid"></div>

      <div class="actor hero" id="hero">
        <div class="actor-name">🦸 용사</div>
        <div class="actor-bar"><div id="heroHpFill" style="width:100%"></div></div>
        <div class="actor-emoji">🦸</div>
      </div>

      <div class="actor monster" id="monster">
        <div class="actor-name" id="monsterName">늑대</div>
        <div class="actor-bar"><div id="monsterHpFill" style="width:100%"></div></div>
        <div class="actor-emoji" id="monsterEmoji">🐺</div>
      </div>

      <div class="effects" id="effects"></div>

      <div class="skill-bar-label" id="skillBarLabel">💢 강타</div>
      <div class="skill-bar" id="skillBar"><div id="skillBarFill" style="width:0%"></div></div>
    </div>
  </div>

  <div class="panel left" id="leftPanel"></div>
  <div class="panel center" id="centerPanel"></div>
  <div class="panel right" id="rightPanel"></div>

  <div class="panel bottom" id="logPanel">
    <h2>📜 로그</h2>
    <div id="logContent"></div>
  </div>
</div>

<script>
/* =========================================================================
   [A] 정적 데이터
   ========================================================================= */

const MATERIALS = {
  slime_jelly: { name: '슬라임 젤리',  sellPrice: 2  },
  wolf_fang:   { name: '늑대 송곳니',  sellPrice: 5  },
  iron_ore:    { name: '철광석',       sellPrice: 8  },
  magic_dust:  { name: '마력의 가루',  sellPrice: 15 },
};

/* 밸런스: 초반 1-2방컷, 보상 ↑ */
const MAPS = {
  meadow: { id:'meadow', name:'초원', monster:'슬라임', mHp:8, mAtk:2, mDef:0,
            goldMin:3, goldMax:7, isBoss:false, reqLevel:1, expReward:15,
            drops:[{matId:'slime_jelly',chance:0.9}] },
  forest: { id:'forest', name:'어둠의 숲', monster:'늑대', mHp:30, mAtk:6, mDef:2,
            goldMin:8, goldMax:15, isBoss:false, reqLevel:3, expReward:35,
            drops:[{matId:'wolf_fang',chance:0.6},{matId:'slime_jelly',chance:0.3}] },
  cave:   { id:'cave', name:'광산 동굴', monster:'광물 골렘', mHp:100, mAtk:15, mDef:8,
            goldMin:20, goldMax:40, isBoss:true, reqLevel:7, expReward:80,
            drops:[{matId:'iron_ore',chance:0.7},{matId:'magic_dust',chance:0.2},
                   {flame:'powerful',chance:0.005}] },
};

const MONSTER_EMOJIS = {
  '슬라임': '🟢',
  '늑대':   '🐺',
  '광물 골렘': '🗿',
};

const ITEM_TEMPLATES = {
  wood_sword:    { id:'wood_sword',    name:'나무 검',         slot:'weapon',    tier:1, baseAtk:5,  baseDef:0,  recipe:{ slime_jelly:5 } },
  iron_sword:    { id:'iron_sword',    name:'강철 검',         slot:'weapon',    tier:2, baseAtk:15, baseDef:0,  recipe:{ wolf_fang:5, iron_ore:3 } },
  mithril_blade: { id:'mithril_blade', name:'미스릴 블레이드', slot:'weapon',    tier:3, baseAtk:35, baseDef:2,  recipe:{ iron_ore:10, magic_dust:5 } },
  leather_armor: { id:'leather_armor', name:'가죽 갑옷',       slot:'armor',     tier:1, baseAtk:0,  baseDef:8,  recipe:{ wolf_fang:3, slime_jelly:3 } },

/* =========================================================================

   ========================================================================= */

function rand(min, max) { return Math.floor(Math.random()*(max-min+1)) + min; }
function rollChance(p)  { return Math.random() < p; }
function pickWeighted(arr) {
  const total = arr.reduce((s,x) => s + x.weight, 0);
  let r = Math.random() * total;
  for (const x of arr) { r -= x.weight; if (r <= 0) return x; }
  return arr[arr.length-1];
}
function genUid() { return 'i' + (state.uidCounter++); }
function log(msg, cls='') {
  state.log.unshift({ msg, cls });
  if (state.log.length > 50) state.log.pop();
}
function tickIntervalMs() { return 1000 / speedMultiplier; }
function scaledDelay(ms)  { return ms / speedMultiplier; }

const STAT_LABELS = {
  atkFlat:'공격력', defFlat:'방어력', hpFlat:'HP', critFlat:'크리율',

  allStat:'올스탯', bossDmg:'보스뎀', dmg:'데미지',
};
const STAT_PCT = new Set(['atkPct','defPct','hpPct','critDmg','bossDmg','dmg','critFlat']);

function statLabel(opt) {
  const name = STAT_LABELS[opt.key] || opt.key;
  const suffix = STAT_PCT.has(opt.key) ? '%' : '';
  return `${name} +${opt.value}${suffix}`;
}

/* =========================================================================
   [C] 스탯 계산
   ========================================================================= */

function getTotals() {
  const p = state.player;
  let atk = p.atkBase, def = p.defBase;
  let hpFlat = 0, crit = 5, critDmg = 50;
  let atkPct = 0, defPct = 0, hpPct = 0, bossDmg = 0, dmg = 0;

  function applyOpt(o) {
    if (o.key === 'atkFlat')  atk += o.value;
    else if (o.key === 'defFlat')  def += o.value;
    else if (o.key === 'hpFlat')   hpFlat += o.value;
    else if (o.key === 'critFlat') crit += o.value;
    else if (o.key === 'atkPct')   atkPct += o.value;
    else if (o.key === 'defPct')   defPct += o.value;
    else if (o.key === 'hpPct')    hpPct += o.value;
    else if (o.key === 'critDmg')  critDmg += o.value;
    else if (o.key === 'allStat')  { atk += o.value; def += o.value; }
    else if (o.key === 'bossDmg')  bossDmg += o.value;
    else if (o.key === 'dmg')      dmg += o.value;
  }

  for (const slot of ['weapon','armor','accessory']) {
    const item = state.equipment[slot];
    if (!item) continue;
    const enhMult = 1 + item.enhanceLevel * 0.2;
    atk += Math.floor(item.baseAtk * enhMult);
    def += Math.floor(item.baseDef * enhMult);
    item.options.forEach(applyOpt);
    item.potentials.forEach(o => o && applyOpt(o));
    item.addPotentials.forEach(o => o && applyOpt(o));
    if (item.flame) item.flame.forEach(applyOpt);
  }

  atk = Math.floor(atk * (1 + atkPct/100));
  def = Math.floor(def * (1 + defPct/100));
  const baseHp = 100 + (p.level-1) * 20;
  const maxHp = Math.floor((baseHp + hpFlat) * (1 + hpPct/100));
  return { atk, def, maxHp, crit, critDmg, bossDmg, dmg };
}

function clampHp() {
  const m = getTotals().maxHp;
  if (state.player.hp > m) state.player.hp = m;
}

/* =========================================================================
   [D] 아이템 생성 (제작)
   ========================================================================= */

function rollOptionsForTier(tier) {
  const count = rand(tier, tier + 1);
  const opts = [];
  for (let i = 0; i < count; i++) {
    const pool = OPTION_POOL[rand(0, OPTION_POOL.length-1)];
    opts.push({ key: pool.key, value: rand(pool.min, pool.max) });
  }
  return opts;
}

function createItemInstance(templateId) {
  const t = ITEM_TEMPLATES[templateId];
  return {
    uid: genUid(), templateId, slot: t.slot,
    baseAtk: t.baseAtk, baseDef: t.baseDef,
    options: rollOptionsForTier(t.tier),
    potentials:    [null, null, null], potentialGrade: 'rare',
    addPotentials: [null, null, null], addPotentialGrade: 'rare',
    flame: null,
    enhanceLevel: 0,
  };
}

function canCraft(templateId) {
  const r = ITEM_TEMPLATES[templateId].recipe;
  for (const mat in r) if ((state.materials[mat]||0) < r[mat]) return false;
  return true;
}

function craft(templateId) {
  if (!canCraft(templateId)) { log('재료가 부족합니다.', 'fail'); return; }
  const r = ITEM_TEMPLATES[templateId].recipe;
  for (const mat in r) state.materials[mat] -= r[mat];
  const item = createItemInstance(templateId);
  state.inventory.push(item);
  log(`🔨 ${ITEM_TEMPLATES[templateId].name} 제작 완료! (옵션 ${item.options.length}개)`, 'win');
  render();
}

/* =========================================================================
   [E] 강화
   ========================================================================= */

function enhanceCost(level) { return (level + 1) * 20; }

function enhance(uid) {
  const item = findItem(uid);
  if (!item) return;
  if (item.enhanceLevel >= MAX_ENHANCE) { log('이미 최대 강화입니다.', 'fail'); return; }
  const cost = enhanceCost(item.enhanceLevel);
  if (state.player.gold < cost) { log(`강화에 ${cost}골드 필요`, 'fail'); return; }
  state.player.gold -= cost;
  const entry = ENHANCE_TABLE[item.enhanceLevel];
  const r = Math.random();
  if (r < entry.success) {
    item.enhanceLevel++;
    log(`✨ 강화 성공! +${item.enhanceLevel}`, 'win');
  } else if (r < entry.success + entry.destroy) {
    removeItem(uid);
    log(`💥 강화 실패 — 아이템 파괴!`, 'fail');
  } else {
    if (item.enhanceLevel >= 5) {
      item.enhanceLevel--;
      log(`⬇️ 강화 실패 — 단계 하락 (+${item.enhanceLevel})`, 'fail');
    } else {
      log(`⚠️ 강화 실패 (유지)`, 'fail');
    }
  }
  clampHp(); render();
}

/* =========================================================================
   [F] 잠재 / 에디
   ========================================================================= */

function rollPotentialLines(grade) {
  const pool = POTENTIAL_POOLS[grade];
  const fillChances = [1.0, 0.7, 0.4];
  return fillChances.map(p => {
    if (!rollChance(p)) return null;
    const meta = pickWeighted(pool);
    return { key: meta.key, value: rand(meta.min, meta.max) };
  });
}

function applyCube(uid, isAdditional) {
  const item = findItem(uid);
  if (!item) return;
  const stockKey = isAdditional ? 'addCube' : 'cube';
  const gradeKey = isAdditional ? 'addPotentialGrade' : 'potentialGrade';
  const slotsKey = isAdditional ? 'addPotentials' : 'potentials';
  const cubeName = isAdditional ? '에디셔널 큐브' : '잠재 큐브';

  if (state.consumables[stockKey] <= 0) { log(`${cubeName} 부족`, 'fail'); return; }
  state.consumables[stockKey]--;

  const cur = item[gradeKey];
  const up = GRADE_UPGRADE[cur];
  if (up > 0 && rollChance(up)) {
    const idx = GRADES.indexOf(cur);
    item[gradeKey] = GRADES[idx + 1];
    log(`🌟 등급 상승! ${GRADE_NAMES[cur]} → ${GRADE_NAMES[item[gradeKey]]}`, item[gradeKey]);
  }

  item[slotsKey] = rollPotentialLines(item[gradeKey]);
  const filled = item[slotsKey].filter(x => x).length;
  log(`🧪 ${cubeName} 사용 [${GRADE_NAMES[item[gradeKey]]}] ${filled}줄`);
  clampHp(); render();
}

function rollFlame(flameType) {
  const pool = FLAME_POOLS[flameType];
  const lines = [];
  for (let i = 0; i < pool.lines; i++) {
    const meta = pickWeighted(pool.options);
    lines.push({ key: meta.key, value: rand(meta.min, meta.max) });
  }
  return lines;
}

function useFlame(uid, flameType) {
  const item = findItem(uid);
  if (!item) return;
  const stockKey = 'flame_' + flameType;
  if (state.consumables[stockKey] <= 0) { log(`${FLAME_NAMES[flameType]} 부족`, 'fail'); return; }
  state.consumables[stockKey]--;
  item.flame = rollFlame(flameType);
  item.flameType = flameType;
  log(`🔥 ${FLAME_NAMES[flameType]} 적용`, flameType === 'powerful' ? 'legendary' : '');
  clampHp(); render();
}

/* =========================================================================
   [G] 인벤토리/장비
   ========================================================================= */

function findItem(uid) {
  if (!uid) return null;
  for (const slot of ['weapon','armor','accessory']) {
    if (state.equipment[slot]?.uid === uid) return state.equipment[slot];
  }
  return state.inventory.find(i => i.uid === uid) || null;
}

function removeItem(uid) {
  for (const slot of ['weapon','armor','accessory']) {
    if (state.equipment[slot]?.uid === uid) { state.equipment[slot] = null; return; }
  }
  state.inventory = state.inventory.filter(i => i.uid !== uid);
}

function equip(uid) {
  const idx = state.inventory.findIndex(i => i.uid === uid);
  if (idx < 0) return;
  const item = state.inventory[idx];
  const slot = item.slot;
  state.inventory.splice(idx, 1);
  if (state.equipment[slot]) state.inventory.push(state.equipment[slot]);
  state.equipment[slot] = item;
  log(`🛡️ ${ITEM_TEMPLATES[item.templateId].name} 장착`);
  clampHp(); render();
}

function unequip(slot) {
  if (!state.equipment[slot]) return;
  state.inventory.push(state.equipment[slot]);
  state.equipment[slot] = null;
  clampHp(); render();
}

function getSellPrice(item) {
  let p = (item.baseAtk + item.baseDef) * 3;
  p += item.options.length * 10;
  p += item.potentials.filter(x => x).reduce((s,x) => s + x.value * 2, 0);
  p += item.addPotentials.filter(x => x).reduce((s,x) => s + x.value * 2, 0);
  if (item.flame) p += item.flame.reduce((s,x) => s + x.value * 1.5, 0);
  p += item.enhanceLevel * 25;
  p += GRADES.indexOf(item.potentialGrade) * 50;
  p += GRADES.indexOf(item.addPotentialGrade) * 50;
  return Math.max(5, Math.floor(p));
}

function sellItem(uid) {
  const item = findItem(uid);
  if (!item) return;
  const price = getSellPrice(item);
  removeItem(uid);
  state.player.gold += price;
  log(`💰 ${ITEM_TEMPLATES[item.templateId].name} 판매 +${price}G`, 'gold');
  render();
}

function sellMaterial(matId, qty) {
  const have = state.materials[matId] || 0;
  qty = Math.min(qty, have);
  if (qty <= 0) return;
  const price = qty * MATERIALS[matId].sellPrice;
  state.materials[matId] -= qty;
  state.player.gold += price;
  log(`💰 ${MATERIALS[matId].name} x${qty} 판매 +${price}G`, 'gold');
  render();
}

function buyCube(qty)    { buyItem('cube', PRICE_CUBE, qty, '잠재 큐브'); }
function buyAddCube(qty) { buyItem('addCube', PRICE_ADD_CUBE, qty, '에디셔널 큐브'); }
function buyFlame(type, qty) { buyItem('flame_'+type, FLAME_PRICES[type], qty, FLAME_NAMES[type]); }
function buyItem(stockKey, unitPrice, qty, name) {
  const cost = unitPrice * qty;
  if (state.player.gold < cost) { log('골드 부족', 'fail'); return; }
  state.player.gold -= cost;
  state.consumables[stockKey] += qty;
  log(`🛒 ${name} x${qty} 구매 (-${cost}G)`);
  render();
}

function updateSceneBars() {
  const t = getTotals();
  const heroPct = Math.max(0, state.player.hp / t.maxHp * 100);
  document.getElementById('heroHpFill').style.width = heroPct + '%';
  if (state.combat.monsterMaxHp > 0) {
    const mPct = Math.max(0, state.combat.monsterHp / state.combat.monsterMaxHp * 100);
    document.getElementById('monsterHpFill').style.width = mPct + '%';
  }
  document.getElementById('sceneInfo').textContent = state.currentMap ? `처치 ${state.combat.kills}` : '';

  // 스킬 게이지
  const skillPct = (state.combat.skillCounter / SKILL_PERIOD) * 100;
  document.getElementById('skillBarFill').style.width = skillPct + '%';
}

function updateCombo() {
  const el = document.getElementById('comboCounter');
  const combo = state.combat.combo;
  if (combo <= 0 || !state.currentMap) {
    el.classList.remove('show');
    return;
  }
  el.classList.add('show');
  el.classList.remove('tier2','tier3','tier4');
  if (combo >= 100) el.classList.add('tier4');
  else if (combo >= 50) el.classList.add('tier3');
  else if (combo >= 25) el.classList.add('tier2');

  document.getElementById('comboNum').textContent = combo;
  const tier = getComboTier(combo);
  document.getElementById('comboBonus').textContent = tier.label;
}

function getComboTier(combo) {
  let cur = COMBO_TIERS[0];
  for (const t of COMBO_TIERS) if (combo >= t.at) cur = t;
  return cur;
}

function triggerActorAnim(id, animClass, durationMs) {
  const el = document.getElementById(id);
  if (!el) return;
  el.classList.remove(animClass);
  void el.offsetWidth;
  el.classList.add(animClass);
  setTimeout(() => el.classList.remove(animClass), durationMs);
}

function spawnDamageNumber(dmg, target, opts={}) {
  const div = document.createElement('div');
  let cls = 'dmg-num';
  if (opts.crit)  cls += ' crit';
  if (opts.skill) cls += ' skill';
  if (target === 'hero') cls += ' player';
  div.className = cls;
  div.textContent = (opts.skill ? '💢 ' : (opts.crit ? '💥 ' : '')) + dmg;
  const baseX = target === 'monster' ? 78 : 22;
  div.style.left = (baseX - 4 + Math.random() * 8) + '%';
  div.style.top = (38 + Math.random() * 8) + '%';
  document.getElementById('effects').appendChild(div);
  setTimeout(() => div.remove(), scaledDelay(950));
}

function spawnSlash(big=false) {
  const div = document.createElement('div');
  if (big) {
    div.className = 'big-slash';
    div.textContent = '💥';
  } else {
    div.className = 'slash';
    div.textContent = ['✦','⚡','✸'][rand(0,2)];
  }
  div.style.left = (big ? 62 : 60 + Math.random() * 10) + '%';
  div.style.top = (big ? 45 : 40 + Math.random() * 10) + '%';
  document.getElementById('effects').appendChild(div);
  setTimeout(() => div.remove(), scaledDelay(big ? 600 : 380));
}

function flashScreen() {
  const scene = document.getElementById('sceneArea');
  scene.classList.remove('skill-flash');
  void scene.offsetWidth;
  scene.classList.add('skill-flash');
  setTimeout(() => scene.classList.remove('skill-flash'), scaledDelay(400));
}

function popCombo() {
  const el = document.getElementById('comboCounter');
  el.classList.remove('popped');
  void el.offsetWidth;
  el.classList.add('popped');
  setTimeout(() => el.classList.remove('popped'), scaledDelay(300));
}

   [속도 토글]
   ========================================================================= */

function setSpeed(s) {
  speedMultiplier = s;
  document.documentElement.style.setProperty('--speed', s);
  for (const id of ['spd1','spd2','spd4']) document.getElementById(id).classList.remove('active');
  document.getElementById('spd' + s).classList.add('active');
  if (huntInterval) {
    clearInterval(huntInterval);
    huntInterval = setInterval(tick, tickIntervalMs());
  }
  log(`⏱️ 속도 x${s}`);
}

   [전투/자동사냥]
   ========================================================================= */

function startHunt(mapId) {
  const map = MAPS[mapId];
  if (state.player.level < map.reqLevel) { log(`Lv.${map.reqLevel} 필요`, 'fail'); return; }
  state.currentMap = mapId;
  state.combat.monsterHp = 0;
  state.combat.monsterMaxHp = map.mHp;
  state.combat.kills = 0;
  state.combat.combo = 0;
  state.combat.skillCounter = 0;
  if (huntInterval) clearInterval(huntInterval);
  huntInterval = setInterval(tick, tickIntervalMs());
  log(`🗺️ ${map.name} 사냥 시작`);
  updateScene();
  render();
}

function stopHunt() {
  if (huntInterval) { clearInterval(huntInterval); huntInterval = null; }
  state.currentMap = null;
  state.combat.monsterHp = 0;
  state.combat.combo = 0;
  state.combat.skillCounter = 0;
  state.player.hp = getTotals().maxHp;
  log('🏘️ 마을로 귀환 (HP 회복)');
  updateScene();
  render();
}

function tick() {
  if (!state.currentMap) return;
  const map = MAPS[state.currentMap];
  const totals = getTotals();

  if (state.combat.monsterHp <= 0) {
    state.combat.monsterHp = map.mHp;
    state.combat.monsterMaxHp = map.mHp;
    document.getElementById('monster').classList.add('show');
    document.getElementById('monsterEmoji').textContent = MONSTER_EMOJIS[map.monster] || '👹';
  }

  // 스킬 카운터 증가, SKILL_PERIOD 도달 시 강타 발동
  state.combat.skillCounter++;
  const useSkill = state.combat.skillCounter >= SKILL_PERIOD;
  if (useSkill) state.combat.skillCounter = 0;

  if (useSkill) {
    triggerActorAnim('hero', 'skill', scaledDelay(500));
    spawnSlash(true);
    flashScreen();
  } else {
    triggerActorAnim('hero', 'attacking', scaledDelay(400));
    spawnSlash(false);
  }

  const isCrit = rollChance(totals.crit / 100);
  let dmg = Math.max(1, totals.atk - map.mDef);
  if (isCrit) dmg = Math.floor(dmg * (1 + totals.critDmg/100));
  dmg = Math.floor(dmg * (1 + totals.dmg/100));
  if (map.isBoss) dmg = Math.floor(dmg * (1 + totals.bossDmg/100));
  if (useSkill) dmg = Math.floor(dmg * SKILL_DMG_MULT);

  state.combat.monsterHp -= dmg;
  spawnDamageNumber(dmg, 'monster', { crit:isCrit, skill:useSkill });
  triggerActorAnim('monster', 'hurt', scaledDelay(350));
  if (useSkill) log(`💢 강타! ${dmg} 데미지`, 'skill');
  else if (isCrit) log(`💥 크리티컬! ${dmg} 데미지`, 'crit');

  updateSceneBars();

  if (state.combat.monsterHp <= 0) {
    triggerActorAnim('monster', 'dying', scaledDelay(600));
    setTimeout(() => onMonsterKill(map), scaledDelay(300));
  } else {
    // 몬스터 반격: tick interval의 40% 시점
    setTimeout(() => {
      if (!state.currentMap) return;
      triggerActorAnim('monster', 'attacking', scaledDelay(400));
      const mDmg = Math.max(1, map.mAtk - totals.def);
      state.player.hp -= mDmg;
      spawnDamageNumber(mDmg, 'hero', {});
      triggerActorAnim('hero', 'hurt', scaledDelay(350));
      updateSceneBars();
      renderPlayer();
      if (state.player.hp <= 0) onPlayerDeath();
    }, tickIntervalMs() * 0.4);
  }
  renderPlayer();
}

function onMonsterKill(map) {
  state.combat.kills++;
  state.combat.combo++;
  popCombo();

  const tier = getComboTier(state.combat.combo);

  // 골드 (콤보 배수 적용)
  let gold = rand(map.goldMin, map.goldMax);
  gold = Math.floor(gold * tier.goldMult);
  state.player.gold += gold;
  log(`⚔️ ${map.monster} 처치 +${gold}G${tier.goldMult>1?` (콤보 x${(tier.goldMult).toFixed(1)})`:''}`, 'gold');

  // 드랍 (콤보 드랍보너스 적용)
  for (const drop of map.drops) {
    const chance = drop.chance + tier.dropBonus;
    if (!rollChance(chance)) continue;
    if (drop.matId) {
      state.materials[drop.matId] = (state.materials[drop.matId]||0) + 1;
      log(`📦 ${MATERIALS[drop.matId].name} 획득`, 'drop');
    } else if (drop.flame) {
      state.consumables['flame_'+drop.flame]++;
      log(`🔥 ${FLAME_NAMES[drop.flame]} 드랍!`, 'legendary');
    }
  }

  // 콤보 마일스톤 알림
  if ([10, 25, 50, 100].includes(state.combat.combo)) {
    log(`🔥 ${state.combat.combo} 콤보 달성! ${tier.label}`, 'win');
  }

  gainExp(map.expReward);
  state.combat.monsterHp = 0;
  updateCombo();
  render();
}

function onPlayerDeath() {
  const lost = Math.floor(state.player.gold * 0.1);
  state.player.gold -= lost;
  state.player.hp = getTotals().maxHp;
  log(`💀 사망! ${lost}G 잃음 (콤보 초기화)`, 'fail');
  state.combat.combo = 0;
  stopHunt();
}

function gainExp(amt) {
  state.player.exp += amt;
  while (state.player.exp >= expForLevel(state.player.level)) {
    state.player.exp -= expForLevel(state.player.level);
    state.player.level++;
    state.player.atkBase += 2;
    state.player.defBase += 1;
    state.player.hp = getTotals().maxHp;
    log(`🎉 레벨업! Lv.${state.player.level}`, 'win');
  }
}

function renderPotentialLine(slots, grade) {
  const lines = slots.map(p => p ? statLabel(p) : '<span style="color:#666">---</span>').join(' · ');
  return `${gradeBadge(grade)}${lines}`;
}

function itemCardHtml(item, equipped) {
  const t = ITEM_TEMPLATES[item.templateId];
  const enh = item.enhanceLevel > 0 ? ` +${item.enhanceLevel}` : '';
  const realAtk = Math.floor(item.baseAtk * (1 + item.enhanceLevel * 0.2));
  const realDef = Math.floor(item.baseDef * (1 + item.enhanceLevel * 0.2));
  const baseStr = [
    item.baseAtk > 0 ? `공격 +${realAtk}` : '',
    item.baseDef > 0 ? `방어 +${realDef}` : '',
  ].filter(x=>x).join(' / ');
  const optStr = item.options.map(statLabel).join(', ') || '없음';

  const gradeIdx = Math.max(
    GRADES.indexOf(item.potentialGrade),
    GRADES.indexOf(item.addPotentialGrade),
  );
  const hasPot = item.potentials.some(x => x) || item.addPotentials.some(x => x);
  const borderColor = hasPot ? GRADE_COLORS[GRADES[gradeIdx]] : '#555';

  const cost = enhanceCost(item.enhanceLevel);
  const flameLine = item.flame
    ? `<div class="item-flame">🔥 [${FLAME_NAMES[item.flameType]}] ${item.flame.map(statLabel).join(', ')}</div>`
    : '';

  let actions = '';
  if (equipped) actions += `<button onclick="unequip('${item.slot}')">해제</button>`;
  else          actions += `<button class="primary" onclick="equip('${item.uid}')">장착</button>`;
  if (item.enhanceLevel < MAX_ENHANCE) {
    actions += `<button class="gold" onclick="enhance('${item.uid}')" ${state.player.gold<cost?'disabled':''}>강화 (${cost}G)</button>`;
  }
  actions += `<button onclick="applyCube('${item.uid}',false)" ${state.consumables.cube<=0?'disabled':''}>🧪 큐브 (${state.consumables.cube})</button>`;
  actions += `<button onclick="applyCube('${item.uid}',true)" ${state.consumables.addCube<=0?'disabled':''}>🧪 에디 (${state.consumables.addCube})</button>`;
  for (const ft of FLAME_TYPES) {
    const cnt = state.consumables['flame_'+ft];
    const initial = { small:'작', master:'명', eternal:'영', powerful:'강' }[ft];
    actions += `<button class="flame" onclick="useFlame('${item.uid}','${ft}')" ${cnt<=0?'disabled':''} title="${FLAME_NAMES[ft]}">🔥${initial}(${cnt})</button>`;
  }
  actions += `<button class="danger" onclick="sellItem('${item.uid}')">판매 ${getSellPrice(item)}G</button>`;

  return `
    <div class="item-card ${equipped?'equipped':''}" style="border-color:${borderColor};">
      <div><span class="item-name">${t.name}${enh}</span> <span class="item-slot">[${t.slot}]</span></div>
      <div class="item-line">${baseStr}</div>
      <div class="item-opt">옵션: ${optStr}</div>
      <div class="item-pot">잠재 ${renderPotentialLine(item.potentials, item.potentialGrade)}</div>
      <div class="item-pot">에디 ${renderPotentialLine(item.addPotentials, item.addPotentialGrade)}</div>
      ${flameLine}
      <div class="item-actions">${actions}</div>
    </div>
  `;
}

      <div class="recipe-card">
        <div class="recipe-name" style="color:${FLAME_COLORS[ft]}">${FLAME_NAMES[ft]}</div>
        <div style="font-size:11px;color:#ccc;">보유 ${state.consumables['flame_'+ft]}개 · 4줄 보너스 스탯</div>
        <button class="flame" onclick="buyFlame('${ft}',1)" ${state.player.gold<price?'disabled':''}>구매 (${price}G)</button>
      </div>
    `;
  }
  html += '<h3>💰 재료 판매</h3>';
  for (const m in MATERIALS) {
    const have = state.materials[m] || 0;
    const price = MATERIALS[m].sellPrice;
    html += `
      <div class="recipe-card" style="display:flex;justify-content:space-between;align-items:center;">
        <div>
          <div class="recipe-name" style="font-size:12px;">${MATERIALS[m].name}</div>
          <div style="font-size:11px;color:#aaa;">보유 ${have} · 개당 ${price}G</div>
        </div>
        <div>
          <button onclick="sellMaterial('${m}',1)"  ${have<1?'disabled':''}>1</button>
          <button onclick="sellMaterial('${m}',10)" ${have<10?'disabled':''}>10</button>
          <button onclick="sellMaterial('${m}',9999)" ${have<1?'disabled':''}>전부</button>
        </div>
      </div>
    `;
  }
  return html;
}

function renderInfoTab() {
  return `
    <h3>⚡ 액션 시스템</h3>
    <div class="recipe-card">
      <div class="recipe-name">⏱️ 속도 토글</div>
      <div style="font-size:11px;color:#ccc;">x1 / x2 / x4 로 사냥 속도 변경. 애니메이션도 함께 가속.</div>
    </div>
    <div class="recipe-card">
      <div class="recipe-name">💢 강타 (자동 스킬)</div>
      <div style="font-size:11px;color:#ccc;">${SKILL_PERIOD}번째 공격마다 자동 발동, ${SKILL_DMG_MULT}배 데미지. 씬 하단 게이지 확인.</div>
    </div>
    <div class="recipe-card">
      <div class="recipe-name">🔥 콤보 보너스</div>
      <div style="font-size:11px;color:#ccc;">연속 처치 — 사망 시 초기화<br>
        ${COMBO_TIERS.slice(1).map(t => `<b style="color:#ffcc44">${t.at}</b>: ${t.label}`).join('<br>')}
      </div>
    </div>
    <h3>📘 강화 시스템</h3>
    <div class="recipe-card">
      <div class="recipe-name">잠재 / 에디셔널</div>
      <div style="font-size:11px;color:#ccc;">큐브로 리롤.
        ${gradeBadge('rare')}${gradeBadge('epic')}${gradeBadge('unique')}${gradeBadge('legendary')}</div>
    </div>
    <div class="recipe-card">
      <div class="recipe-name">환생의 불꽃</div>
      <div style="font-size:11px;color:#ccc;">4줄 보너스 스탯. 강력한 불꽃은 광산 동굴 0.5% 드랍</div>
    </div>
    <div class="recipe-card">
      <div class="recipe-name">강화 (+0 ~ +10)</div>
      <div style="font-size:11px;color:#ccc;">단계당 기본 스탯 +20%. 6강부터 실패 시 단계 하락, 파괴 확률.</div>
    </div>
  `;
}

function setTab(t) { state.activeTab = t; render(); }

function renderLog() {
  document.getElementById('logContent').innerHTML =
    state.log.map(e => `<div class="log-line ${e.cls}">${e.msg}</div>`).join('');
}

function render() {
  renderPlayer();
  renderLeft();
  renderCenter();
  renderRight();
  renderLog();
  updateSceneBars();
  updateCombo();
}

   초기화

state.equipment.weapon = starter;

log('💡 우측 [안내] 탭에서 콤보·강타·속도 토글을 확인하세요.', 'gold');
updateScene();
render();
</script>
